services:
  # Backend сервис
  - type: web
    name: geo-guesser-server
    runtime: node
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://geo-guesser-client.onrender.com

  # Frontend сервис (Static)
  - type: web
    name: geo-guesser-client
    runtime: static
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: ./client/dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://geo-guesser-server.onrender.com
      - key: VITE_SOCKET_URL
        value: https://geo-guesser-server.onrender.com
